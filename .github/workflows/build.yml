name: Build uqmi for OpenWrt

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - mipsel_24kc-25.12.2
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Inject commit SHA into Makefile
        run: |
          sha="$(git rev-parse HEAD)"
          echo "Building from commit $sha"
          sed -i "s/__PKG_SOURCE_VERSION__/$sha/" openwrt-build/uqmi/Makefile
          grep -E "PKG_(SOURCE_VERSION|MIRROR_HASH)" openwrt-build/uqmi/Makefile

      - name: Prepare feed layout
        run: |
          mkdir -p feed/utils
          cp -r openwrt-build/uqmi feed/utils/uqmi

      - name: Build patched gh-action-sdk image
        run: |
          mkdir -p docker-ctx
          curl -sL https://raw.githubusercontent.com/openwrt/gh-action-sdk/main/entrypoint.sh \
            -o docker-ctx/entrypoint.sh

          # Strip the post-check hash grep that promotes "deprecated hash"
          # warnings into fatal errors. PKG_MIRROR_HASH:=skip is honored by
          # OpenWrt itself; only this layer rejects it.
          sed -i '/badhash_msg="HASH does not match/,/^\t\tfi$/d' docker-ctx/entrypoint.sh
          chmod +x docker-ctx/entrypoint.sh

          cat > docker-ctx/Dockerfile <<EOF
          FROM ghcr.io/openwrt/sdk:${{ matrix.arch }}
          COPY entrypoint.sh /entrypoint.sh
          ENTRYPOINT ["/entrypoint.sh"]
          EOF

          docker build -t patched-sdk docker-ctx

      - name: Fix workspace ownership for buildbot (uid 1000)
        run: sudo chown -R 1000:1000 "$GITHUB_WORKSPACE"

      - name: Run patched SDK build
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/artifacts \
            -v "$GITHUB_WORKSPACE/feed":/feed \
            -e ARCH=${{ matrix.arch }} \
            -e PACKAGES=uqmi \
            -e NO_REFRESH_CHECK=1 \
            -e NO_SHFMT_CHECK=1 \
            -e V=s \
            patched-sdk

      - name: Restore workspace ownership
        if: always()
        run: sudo chown -R --reference="$GITHUB_WORKSPACE/.." "$GITHUB_WORKSPACE"

      - name: Show build artifacts
        if: always()
        run: |
          find "$GITHUB_WORKSPACE" -type f \( -name '*.apk' -o -name '*.ipk' \) -print 2>/dev/null || true

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: uqmi-${{ matrix.arch }}
          path: |
            **/uqmi*.apk
            **/uqmi*.ipk
          if-no-files-found: error
